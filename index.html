<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finflo | Enterprise</title>

    <style>
        /* SAP ENTERPRISE COLOR PALETTE */
        :root {
            --bg-page: #f3f4f7;        
            --bg-card: #ffffff;        
            --bg-sidebar: #0a1931;     
            --accent-blue: #0070f2;    
            --accent-light: #e5f0fa;   
            --accent-green: #107e3e;   
            --text-main: #1c2733;      
            --text-muted: #6a6d70;     
            --border-color: #d9d9d9;   
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px; background: var(--bg-sidebar); 
            padding: 40px 15px; display: flex; flex-direction: column; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 100;
        }

        .logo-area { text-align: center; margin-bottom: 40px; color: #fff; font-size: 28px; font-weight: 900; letter-spacing: 1px;}
        .logo-area img { max-width: 140px; margin-bottom: 10px; }

        .nav-category { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #8ba1b7; margin: 20px 0 10px 10px; font-weight: 700; }
        .nav-item { padding: 14px 20px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; transition: 0.2s; font-weight: 500; color: #d0dbe6; border-left: 4px solid transparent; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .nav-item.active { background: rgba(0, 112, 242, 0.2); border-left: 4px solid var(--accent-blue); color: #ffffff; font-weight: bold; }

        /* MAIN AREA */
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px; }
        .view-section { width: 100%; max-width: 800px; display: none; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CORPORATE CARDS */
        .card { background: var(--bg-card); padding: 50px 60px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: var(--shadow); text-align: center; }
        h1 { font-size: 36px; font-weight: 700; margin-bottom: 10px; color: var(--text-main); }
        .subtitle { color: var(--text-muted); font-size: 16px; margin-bottom: 40px; }

        /* DRAG & DROP ZONE */

            padding: 60px 20px; background: var(--accent-light); cursor: pointer; 
            transition: all 0.2s ease; display: block; position: relative;
