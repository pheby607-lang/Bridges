<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finflo | Enterprise</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg-page: #f3f4f7;        
            --bg-card: #ffffff;        
            --bg-sidebar: #0a1931;     
            --accent-blue: #0070f2;    
            --accent-light: #e5f0fa;   
            --accent-green: #107e3e;   
            --text-main: #1c2733;      
            --text-muted: #6a6d70;     
            --border-color: #d9d9d9;   
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px; background: var(--bg-sidebar); 
            padding: 40px 15px; display: flex; flex-direction: column; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 100;
        }

        .logo-area { text-align: center; margin-bottom: 40px; color: #fff; font-size: 28px; font-weight: 900; letter-spacing: 1px;}
        .logo-area img { max-width: 90px; margin-bottom: 10px; }

        .nav-category { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #8ba1b7; margin: 24px 0 10px 10px; font-weight: 700; }
        .nav-item { padding: 14px 20px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; transition: 0.2s; font-weight: 500; color: #d0dbe6; border-left: 4px solid transparent; display: flex; justify-content: space-between; align-items: center;}
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .nav-item.active { background: rgba(0, 112, 242, 0.2); border-left: 4px solid var(--accent-blue); color: #ffffff; font-weight: bold; }

        /* MAIN AREA */
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px; overflow-y: auto; }
        .view-section { width: 100%; max-width: 800px; display: none; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS */
        .card { background: var(--bg-card); padding: 50px 60px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: var(--shadow); text-align: center; }
        h1 { font-size: 36px; font-weight: 700; margin-bottom: 10px; color: var(--text-main); }
        .subtitle { color: var(--text-muted); font-size: 16px; margin-bottom: 40px; }

        /* DRAG & DROP */
        .upload-label { 
            width: 100%; border: 2px dashed var(--accent-blue); border-radius: 12px; 
            padding: 60px 20px; background: var(--accent-light); cursor: pointer; 
            transition: all 0.2s ease; display: block; 
        }
        .upload-label p { font-size: 20px; font-weight: 600; color: var(--accent-blue); }
        
        .btn { 
            background: var(--accent-blue); color: white; border: none; padding: 18px; 
            border-radius: 8px; font-size: 16px; font-weight: bold; width: 100%; 
            margin-top: 30px; cursor: pointer; display: none; transition: 0.2s;
        }
        .btn:hover { background: #0054b6; }
        .status-msg { margin-top: 20px; font-weight: bold; color: var(--accent-green); font-size: 15px; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <img src="logo.png" alt="" onerror="this.style.display='none'">
            <div>Finflo</div>
        </div>
        
        <div class="nav-category">Data Processing</div>
        <div class="nav-item active" id="nav-sales" onclick="switchView('sales')">Sales</div>
        <div class="nav-item" id="nav-purchase" onclick="switchView('purchase')">Purchase</div>
        
        <div class="nav-category">Reconciliation</div>
        <div class="nav-item" id="nav-pnl" onclick="switchView('pnl')">Profit & Loss</div>
        <div class="nav-item" id="nav-brs" onclick="switchView('brs')">BRS</div>
        <div class="nav-item" id="nav-ledgers" onclick="switchView('ledgers')">Ledgers</div>

        <div style="margin-top: auto; text-align: center; font-size: 11px; color: #8ba1b7;">FINFLO ENTERPRISE V10.3</div>
    </div>

    <div class="main-content">
        <div id="view-sales" class="view-section active">
            <div class="card">
                <h1>Sales</h1>
                <div class="subtitle">Upload your Sales Excel</div>
                <label class="upload-label" for="sales-upload"><p>📄 Drag or Paste Sales Excel Here</p></label>
                <input id="sales-upload" type="file" accept=".xlsx, .csv" />
                <div id="sales-status" class="status-msg"></div>
                <button id="sales-dl" class="btn">Download Tally Sales</button>
            </div>
        </div>

        <div id="view-purchase" class="view-section">
            <div class="card">
                <h1>Purchase</h1>
                <div class="subtitle">Upload your Purchase Excel</div>
                <label class="upload-label" for="purchase-upload" style="border-color: var(--accent-green); background: #e6f4ea;"><p style="color: var(--accent-green);">📦 Drag or Paste Purchase Excel Here</p></label>
                <input id="purchase-upload" type="file" accept=".xlsx, .csv" />
                <div id="purchase-status" class="status-msg"></div>
                <button id="purchase-dl" class="btn" style="background: var(--accent-green);">Download Tally Purchase</button>
            </div>
        </div>

        <div id="view-locked" class="view-section">
            <div class="card">
                <h1 style="color: var(--bg-sidebar);">Module in Development</h1>
                <div class="subtitle" id="locked-subtitle">On-screen reporting dashboard for banking, ledger, and P&L.</div>
            </div>
        </div>
    </div>

    <script>
        let salesData = [], purchaseData = [];

        const parseNum = val => {
            if (!val) return 0;
            if (typeof val === 'number') return val;
            return parseFloat(String(val).replace(/[^\d.-]/g, '')) || 0;
        };

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('nav-' + view).classList.add('active');
            if (['pnl', 'brs', 'ledgers'].includes(view)) {
                document.getElementById('view-locked').classList.add('active');
            } else {
                document.getElementById('view-' + view).classList.add('active');
            }
        }

        function handleFile(file, type) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, defval: ""});
                if (type === 'sales') processSales(json);
                else processPurchase(json);
            };
            reader.readAsArrayBuffer(file);
        }

        document.getElementById('sales-upload').onchange = e => handleFile(e.target.files[0], 'sales');
        document.getElementById('purchase-upload').onchange = e => handleFile(e.target.files[0], 'purchase');

        // === STORE-WISE SALES ENGINE (V10.3 FIXED) ===
        function processSales(data) {
            const date = "31-03-2026";
            const h1 = data[0], h2 = data[1];
            if(!h1 || !h2) return;

            const headers = h1.map((v, i) => `${String(v).trim()} ${String(h2[i]||'').trim()}`.toLowerCase());
            const pIdx = headers.findIndex(h => h.includes("product") || h.includes("system")) || 1;
            const gIdx = headers.findIndex(h => h.includes("gst")) || 2;
            const bIdx = headers.findIndex(h => h.includes("billing")) || 3;
            
            // Find all unique stores
            const stores = headers.map((h, i) => ({n: h, id: i})).filter(h => h.id > bIdx && h.n && !h.n.includes("total"));

            salesData = [["SL", "voucher no", "voucher date", "Party name", "Product", "Qty", "GST %", "Rate per Qty excl.GST", "Cgst", "SGST", "IGST", "Total"]];

            const localKeywords = ["chikmagalur", "frazer town", "hal", "hesaraghatta", "hoskote", "jeevan bima nagar", "kammanahalli", "kannamangala", "kempapura", "k r puram", "nelamangala", "new bel road", "sahakaranagar", "t c palya", "kalyan nagar", "vidyaranyapura"];

            // FLIPPED LOOP: Loop through Stores first for Store-wise organization
            stores.forEach((s, sIdx) => {
                for (let r = 2; r < data.length; r++) {
                    if(!data[r][pIdx]) continue;
                    
                    let q = parseNum(data[r][s.id]);
                    if(q > 0) {
                        let gRaw = parseNum(data[r][gIdx]);
                        let g = Math.round(gRaw < 1 ? gRaw * 100 : gRaw);
                        let billRate = parseNum(data[r][bIdx]);
                        let rate = parseFloat((billRate / (1 + (g/100))).toFixed(2));
                        
                        let taxable = rate * q;
                        let isLocal = localKeywords.some(kw => new RegExp('\\b' + kw + '\\b', 'i').test(s.n));
                        let tax = taxable * (g/100);
                        let c = isLocal ? parseFloat((tax/2).toFixed(2)) : 0;
                        let st = isLocal ? parseFloat((tax/2).toFixed(2)) : 0;
                        let ig = isLocal ? 0 : parseFloat(tax.toFixed(2));
                        
                        salesData.push([
                            salesData.length, sIdx+1, date, s.n, data[r][pIdx], q, g, rate, c, st, ig, parseFloat((taxable + c + st + ig).toFixed(2))
                        ]);
                    }
                }
            });
            document.getElementById('sales-status').innerText = "✓ Sales Processed Store-Wise";
            document.getElementById('sales-dl').style.display = "block";
        }

        // === PURCHASE ENGINE (FIXED) ===
        function processPurchase(data) {
            const status = document.getElementById('purchase-status');
            let hIdx = -1;
            for(let i=0; i<Math.min(20, data.length); i++) {
                if(data[i].some(c => String(c).toLowerCase().includes('taxable value'))) { hIdx = i; break; }
            }
            if(hIdx === -1) { status.innerText = "Error: Headers not found"; return; }

            const h = data[hIdx].map(v => String(v).toLowerCase().trim());
            const pIdx = h.findIndex(v => v.includes('trade/legal'));
            const invIdx = h.findIndex(v => v.includes('invoice') || v.includes('document'));
            const taxValIdx = h.findIndex(v => v.includes('taxable value'));
            const igstIdx = h.findIndex(v => v.includes('integrated tax'));
            const cgstIdx = h.findIndex(v => v.includes('central tax'));
            const sgstIdx = h.findIndex(v => v.includes('state/ut tax'));

            purchaseData = [["Date", "Voucher Type", "Party Name (Cr)", "Narration", "Dr Ledger 1", "Amount 1 (Taxable)", "Dr Ledger 2", "Amount 2", "Dr Ledger 3", "Amount 3", "Total Invoice Value"]];

            for(let r = hIdx + 1; r < data.length; r++) {
                let party = String(data[r][pIdx] || "").trim();
                let taxable = parseNum(data[r][taxValIdx]);
                if(!party || party.toLowerCase().includes("total") || taxable === 0) continue;

                let igst = parseNum(data[r][igstIdx]), cgst = parseNum(data[r][cgstIdx]), sgst = parseNum(data[r][sgstIdx]);
                let totalTax = igst + cgst + sgst;
                let inv = invIdx !== -1 ? String(data[r][invIdx] || "").trim() : "N/A";
                let isBank = party.toLowerCase().includes('bank') || party.toLowerCase().includes('phonepe');
                let isIGST = igst > (cgst + sgst);

                const rates = [0.0, 0.05, 0.12, 0.18, 0.28, 0.40];
                let splits = [];
                let found = false;
                for (let rate of rates) {
                    if (Math.abs((taxable * rate) - totalTax) <= 2.5) {
                        splits.push({ rate: rate * 100, taxable: taxable, tax: totalTax });
                        found = true; break;
                    }
                }
                if (!found) {
                    for (let i = 0; i < rates.length; i++) {
                        for (let j = i + 1; j < rates.length; j++) {
                            let r1 = rates[i], r2 = rates[j];
                            let t1 = (totalTax - (taxable * r2)) / (r1 - r2);
                            let t2 = taxable - t1;
                            if (t1 > 1 && t2 > 1) { splits.push({ rate: r1*100, taxable: t1, tax: t1*r1 }, { rate: r2*100, taxable: t2, tax: t2*r2 }); found = true; break; }
                        }
                        if (found) break;
                    }
                }
                if (!found) splits.push({ rate: "MANUAL", taxable: taxable, tax: totalTax });

                splits.forEach(split => {
                    let rLabel = split.rate === "MANUAL" ? "MANUAL" : `${split.rate}%`;
                    let subLabel = split.rate === "MANUAL" ? "MANUAL" : `${split.rate / 2}%`;
                    let dr2 = isIGST ? `Input igst @ ${rLabel}` : `Input cgst @ ${subLabel}`;
                    let amt2 = isIGST ? parseFloat(split.tax.toFixed(2)) : parseFloat((split.tax / 2).toFixed(2));
                    let dr3 = isIGST ? "" : `Input sgst @ ${subLabel}`;
                    let amt3 = isIGST ? "" : parseFloat((split.tax / 2).toFixed(2));

                    purchaseData.push([
                        "31-03-2026", isBank ? "Journal" : "Purchase", party, `Being purchase recorded as per 2B (${inv})`, isIGST ? "Purchase Interstate" : "Purchase Local", parseFloat(split.taxable.toFixed(2)), dr2, amt2, dr3, amt3, parseFloat((split.taxable + split.tax).toFixed(2))
                    ]);
                });
            }
            status.innerText = "✓ Purchase Processed Successfully";
            document.getElementById('purchase-dl').style.display = "block";
        }

        document.getElementById('sales-dl').onclick = () => {
            const ws = XLSX.utils.aoa_to_sheet(salesData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sales"); XLSX.writeFile(wb, "Finflo_Sales.xlsx");
        };
        document.getElementById('purchase-dl').onclick = () => {
            const ws = XLSX.utils.aoa_to_sheet(purchaseData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Purchase"); XLSX.writeFile(wb, "Finflo_Purchase.xlsx");
        };
    </script>
</body>
</html>
