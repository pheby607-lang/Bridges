<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridges Data Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        /* 1. Reset and Apply Apple Font (San Francisco) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
        }

        /* 2. Full-Screen Wallpaper Background */
        body {
            background-image: url("wallpaper.png");
            background-color: #000000; /* Fallback */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 3. Glassmorphism Sidebar */
        .sidebar {
            width: 280px;
            background-color: rgba(10, 10, 10, 0.95);
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-area img {
            max-width: 150px;
        }

        .nav-item, .coming-soon-btn {
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .nav-item {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .coming-soon-btn {
            background-color: transparent;
            border: 1px dashed rgba(255, 255, 255, 0.3);
            color: #888;
            cursor: not-allowed;
        }

        hr {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 20px 0;
        }

        /* 4. Main Glassmorphism Dashboard Area */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        .glass-panel {
            background-color: rgba(10, 10, 10, 0.85);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 900px;
            height: fit-content;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 5. Custom File Uploader UI - FIX APPLIED HERE */
        .file-upload-wrapper {
            display: block; /* Forces it to take up the full width */
            width: 100%;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 40px;
            text-align: center; /* Centers the text perfectly now */
            background-color: rgba(255, 255, 255, 0.05);
            transition: 0.3s;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .file-upload-wrapper:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: #ffffff;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            cursor: pointer;
            font-size: 18px;
            font-weight: 500;
        }

        .btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            margin-top: 20px;
            display: none; /* Hidden until data is processed */
        }

        .btn:hover {
            background-color: #e0e0e0;
        }

        #status {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #4CAF50; /* Success Green */
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <img src="logo.png" alt="Bridges Logo" onerror="this.style.display='none'">
        </div>
        
        <h3 style="color: #a9a9a9; margin-bottom: 10px; font-size: 14px;">🗂️ Active Modules</h3>
        <div class="nav-item">Data Formatter</div>
        <div class="nav-item" onclick="alert('My Work Module - Coming Soon to the Web Version!')">My Work</div>
        <div class="nav-item" onclick="alert('Your Learning Module - Coming Soon to the Web Version!')">Your Learning</div>
        
        <hr>
        
        <h3 style="color: #a9a9a9; margin-bottom: 10px; font-size: 14px;">🚀 Coming Soon</h3>
        <button class="coming-soon-btn" disabled>Purchase Formats</button>
        <button class="coming-soon-btn" disabled>Bank Statements</button>
    </div>

    <div class="main-content">
        <div class="glass-panel">
            <h1>Bridges Data Engine</h1>
            
            <label class="file-upload-wrapper" for="file-upload">
                <div class="custom-file-upload">
                    📁 Click here to Upload Excel or CSV
                </div>
                <input id="file-upload" type="file" accept=".xlsx, .csv" />
            </label>

            <div id="status"></div>
            <button id="download-btn" class="btn">⬇️ Download Formatted Excel</button>
        </div>
    </div>

    <script>
        let finalWorkbookData = [];

        document.getElementById('file-upload').addEventListener('change', handleFile, false);
        document.getElementById('download-btn').addEventListener('click', downloadExcel, false);

        function handleFile(e) {
            const files = e.target.files;
            if (files.length === 0) return;
            const file = files[0];
            const fileName = file.name.toLowerCase();
            
            document.getElementById('status').innerText = "Processing Data...";
            document.getElementById('status').style.color = "#FFC107"; 

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    const rawData = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: ""});
                    
                    processData(rawData, fileName);
                } catch (error) {
                    document.getElementById('status').innerText = "Error parsing file. Ensure it is a valid format.";
                    document.getElementById('status').style.color = "#FF5252";
                    console.error(error);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function processData(data, fileName) {
            if(data.length < 3) {
                alert("File too small. Expecting headers on rows 1 and 2, data starting row 3.");
                return;
            }

            const today = new Date();
            const today_ist = String(today.getDate()).padStart(2, '0') + '/' + 
                              String(today.getMonth() + 1).padStart(2, '0') + '/' + 
                              today.getFullYear();

            const header1 = data[0];
            const header2 = data[1];
            let combinedHeaders = [];
            
            for(let i=0; i < Math.max(header1.length, header2.length); i++) {
                let p = header1[i] ? String(header1[i]).trim() : "";
                let s = header2[i] ? String(header2[i]).trim() : "";
                if (s && s.toLowerCase() !== "nan") {
                    combinedHeaders.push(`${p} ${s}`.trim());
                } else {
                    combinedHeaders.push("");
                }
            }

            let productColIdx = -1, billingColIdx = -1, gstColIdx = -1;
            
            for(let i=0; i < combinedHeaders.length; i++) {
                let col = combinedHeaders[i].toLowerCase();
                if(col === "") continue;
                
                if (productColIdx === -1 && (col.includes("system") || col.includes("product") || col.includes("item"))) productColIdx = i;
                if (billingColIdx === -1 && col.includes("billing")) billingColIdx = i;
                if (gstColIdx === -1 && col.includes("gst")) gstColIdx = i;
            }

            if(productColIdx === -1) productColIdx = 1;
            if(gstColIdx === -1) gstColIdx = 2;
            if(billingColIdx === -1) billingColIdx = 3;

            let storeColumns = [];
            for(let i = billingColIdx + 1; i < combinedHeaders.length; i++) {
                if(combinedHeaders[i] && !combinedHeaders[i].toLowerCase().includes("total")) {
                    storeColumns.push({name: combinedHeaders[i], index: i});
                }
            }

            let voucherMap = {};
            storeColumns.forEach((col, index) => {
                voucherMap[col.name] = index + 1;
            });

            let meltedData = [];
            for (let r = 2; r < data.length; r++) {
                let row = data[r];
                if(!row || row.length === 0) continue;

                let product = row[productColIdx];
                let rawBilling = row[billingColIdx];
                let rawGst = row[gstColIdx];

                if(!product) continue;

                storeColumns.forEach(store => {
                    let rawQty = String(row[store.index] || "").replace(/[^\d.]/g, '');
                    let qty = parseFloat(rawQty);
                    
                    if (!isNaN(qty) && qty > 0) {
                        meltedData.push({
                            product: product,
                            billing: rawBilling,
                            gst: rawGst,
                            party: store.name,
                            qty: qty,
                            voucherNo: voucherMap[store.name]
                        });
                    }
                });
            }

            meltedData.sort((a, b) => a.voucherNo - b.voucherNo);

            const karnataka_cities = [
                "bengaluru", "mysuru", "mangaluru", "hubballi", "dharwad", "belagavi",
                "kalaburagi", "ballari", "vijayapura", "shivamogga", "tumakuru", "raichur",
                "bidar", "hospet", "gadag", "udupi", "chitradurga", "hassan", "mandya",
                "kolar", "chikkaballapur", "ramanagara", "chikkamagaluru", "madikeri",
                "karwar", "bagalkot", "yadgir", "koppal", "haveri", "davanagere",
                "chamarajanagar", "kodagu", "bhadravati", "robertsonpet", "kolar gold fields",
                "sirsi", "dandeli", "ranebennur", "gokak", "jamkhandi", "sindhanur",
                "gangavati", "ilkal", "sagar"
            ];
            const isKarnataka = karnataka_cities.some(city => fileName.includes(city));

            finalWorkbookData = [];
            
            finalWorkbookData.push([
                "SL", "voucher no", "voucher date", "Party name", "Product", "Qty", 
                "GST %", "Rate per Qty excl.GST", "Cgst", "SGST", "IGST", "Total"
            ]);

            meltedData.forEach((item, index) => {
                let gstStr = String(item.gst || "").replace(/[^\d.]/g, '');
                let gstNum = parseFloat(gstStr) || 0;
                let gstPercent = (gstNum < 1 && gstNum > 0) ? Math.round(gstNum * 100) : Math.round(gstNum);

                let billingStr = String(item.billing || "").replace(/[^\d.]/g, '');
                let billingPrice = parseFloat(billingStr) || 0;

                let rateExcl = 0;
                if (gstPercent === 5) rateExcl = billingPrice / 1.05;
                else if (gstPercent === 12) rateExcl = billingPrice / 1.12;
                else if (gstPercent === 18) rateExcl = billingPrice / 1.18;
                else if (gstPercent === 28) rateExcl = billingPrice / 1.28;
                else if (gstPercent === 40) rateExcl = billingPrice / 1.40;
                else rateExcl = billingPrice / (1 + (gstPercent / 100));
                
                rateExcl = parseFloat(rateExcl.toFixed(2));

                let totalTax = rateExcl * (gstPercent / 100) * item.qty;
                let cgst = 0, sgst = 0, igst = 0;

                if (isKarnataka) {
                    cgst = parseFloat((totalTax / 2).toFixed(2));
                    sgst = parseFloat((totalTax / 2).toFixed(2));
                } else {
                    igst = parseFloat(totalTax.toFixed(2));
                }

                let totalRow = (rateExcl * item.qty) + cgst + sgst + igst;

                finalWorkbookData.push([
                    index + 1,              
                    item.voucherNo,         
                    today_ist,              
                    item.party,             
                    item.product,           
                    item.qty,               
                    gstPercent,             
                    rateExcl,               
                    cgst,                   
                    sgst,                   
                    igst,                   
                    parseFloat(totalRow.toFixed(2)) 
                ]);
            });

            let taxType = isKarnataka ? 'CGST & SGST (Karnataka Detected)' : 'IGST';
            document.getElementById('status').innerText = `Success! Generated ${meltedData.length} Rows. Tax Applied: ${taxType}`;
            document.getElementById('status').style.color = "#4CAF50";
            document.getElementById('download-btn').style.display = "block";
        }

        function downloadExcel() {
            if(finalWorkbookData.length === 0) return;
            
            const ws = XLSX.utils.aoa_to_sheet(finalWorkbookData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Formatted Data");
            
            XLSX.writeFile(wb, "Bridges_Output.xlsx");
        }
    </script>
</body>
</html>
