<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridges</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        /* THE ELITE PURPLE THEME */
        :root {
            --bg-black: #000000;
            --accent-purple: #bf00ff; /* Brighter Neon Purple */
            --dark-purple: #1a0033;
            --text-white: #ffffff;
            --text-gray: #888888;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* FULL SCREEN WALLPAPER FIX */
        body {
            background-color: var(--bg-black);
            background-image: url("wallpaper.png"); /* This pulls your file */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: var(--text-white);
        }

        /* MODERN SIDEBAR */
        .sidebar {
            width: 240px;
            background: rgba(0, 0, 0, 0.85); /* Semi-transparent black */
            backdrop-filter: blur(20px);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(191, 0, 255, 0.3);
            z-index: 10;
        }

        .logo-area { text-align: center; margin-bottom: 60px; }
        .logo-area img { 
            max-width: 120px; 
            filter: drop-shadow(0 0 15px var(--accent-purple)); 
        }

        .nav-active {
            padding: 16px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(191, 0, 255, 0.2), transparent);
            border: 1px solid var(--accent-purple);
            color: var(--text-white);
            font-weight: 700;
            text-align: center;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(191, 0, 255, 0.2);
        }

        /* MAIN CONTENT AREA */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        /* THE CONVERTER CARD */
        .main-card {
            background: rgba(5, 5, 5, 0.7); /* Deep dark glass */
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 700px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 40px;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* THE UPLOAD BOX */
        .drop-zone {
            width: 100%;
            height: 200px;
            border: 2px dashed rgba(191, 0, 255, 0.5);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(191, 0, 255, 0.03);
        }

        .drop-zone:hover {
            border-color: var(--accent-purple);
            background: rgba(191, 0, 255, 0.08);
            box-shadow: 0 0 30px rgba(191, 0, 255, 0.1);
        }

        .drop-zone p { font-size: 18px; font-weight: 600; color: #fff; }
        .drop-zone span { font-size: 14px; color: var(--text-gray); margin-top: 8px; }

        input[type="file"] { display: none; }

        /* THE ACTION BUTTON */
        .convert-btn {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 800;
            width: 100%;
            margin-top: 30px;
            cursor: pointer;
            display: none;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(191, 0, 255, 0.4);
        }

        .convert-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(191, 0, 255, 0.6);
        }

        #status-text {
            margin-top: 25px;
            font-weight: 600;
            color: var(--accent-purple);
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* VERSION TAG */
        .version {
            margin-top: auto;
            text-align: center;
            font-size: 10px;
            color: var(--text-gray);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <img src="logo.png" alt="B" onerror="this.style.display='none'">
        </div>
        <div class="nav-active">FORMATTER</div>
        <div class="version">V 5.0 | BY BRIDGES</div>
    </div>

    <div class="main-content">
        <div class="main-card">
            <h1>Bridges</h1>
            
            <label class="drop-zone" for="file-input">
                <p>Drop Excel File</p>
                <span>or click to browse your computer</span>
                <input id="file-input" type="file" accept=".xlsx, .csv" />
            </label>

            <div id="status-text"></div>
            <button id="download-btn" class="convert-btn">DOWNLOAD CONVERTED SHEET</button>
        </div>
    </div>

    <script>
        let processedData = [];

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('status-text').innerText = "Processing Logic...";
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
                
                runBridgesEngine(json, file.name.toLowerCase());
            };
            reader.readAsArrayBuffer(file);
        });

        function runBridgesEngine(data, fileName) {
            const today = new Date().toLocaleDateString('en-GB'); // DD/MM/YYYY
            
            const h1 = data[0];
            const h2 = data[1];
            let headers = h1.map((val, i) => {
                let sub = String(h2[i] || "").trim();
                return (sub && sub.toLowerCase() !== "nan") ? `${String(val).trim()} ${sub}`.trim() : "";
            });

            let pIdx = headers.findIndex(h => h.toLowerCase().includes("product") || h.toLowerCase().includes("system")) || 1;
            let gIdx = headers.findIndex(h => h.toLowerCase().includes("gst")) || 2;
            let bIdx = headers.findIndex(h => h.toLowerCase().includes("billing")) || 3;

            let stores = headers.map((h, i) => ({name: h, idx: i})).filter(h => h.idx > bIdx && h.name && !h.name.toLowerCase().includes("total"));

            let results = [["SL", "voucher no", "voucher date", "Party name", "Product", "Qty", "GST %", "Rate per Qty excl.GST", "Cgst", "SGST", "IGST", "Total"]];

            let rowCount = 0;
            for (let r = 2; r < data.length; r++) {
                if(!data[r][pIdx]) continue;
                
                stores.forEach((store, sIdx) => {
                    let rawQty = String(data[r][store.idx] || "").replace(/[^\d.]/g, '');
                    let qty = parseFloat(rawQty);
                    
                    if(qty > 0) {
                        rowCount++;
                        let gRaw = parseFloat(String(data[r][gIdx]).replace(/[^\d.]/g, '')) || 0;
                        let gPercent = (gRaw < 1 && gRaw > 0) ? Math.round(gRaw * 100) : Math.round(gRaw);
                        let bill = parseFloat(String(data[r][bIdx]).replace(/[^\d.]/g, '')) || 0;
                        
                        let rate = parseFloat((bill / (1 + (gPercent / 100))).toFixed(2));
                        let tax = rate * (gPercent / 100) * qty;
                        
                        const isKA = ["bengaluru", "mysuru", "mangaluru", "hubballi", "belagavi"].some(c => fileName.includes(c));
                        
                        let c = isKA ? parseFloat((tax/2).toFixed(2)) : 0;
                        let s = isKA ? parseFloat((tax/2).toFixed(2)) : 0;
                        let i = isKA ? 0 : parseFloat(tax.toFixed(2));
                        let total = parseFloat(((rate * qty) + c + s + i).toFixed(2));

                        results.push([rowCount, sIdx + 1, today, store.name, data[r][pIdx], qty, gPercent, rate, c, s, i, total]);
                    }
                });
            }

            processedData = results;
            document.getElementById('status-text').innerText = `SUCCESS: ${rowCount} ROWS GENERATED`;
            document.getElementById('download-btn').style.display = "block";
        }

        document.getElementById('download-btn').addEventListener('click', function() {
            const ws = XLSX.utils.aoa_to_sheet(processedData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Bridges_Output");
            XLSX.writeFile(wb, "Bridges_Output.xlsx");
        });
    </script>
</body>
</html>
