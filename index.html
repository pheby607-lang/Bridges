<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridges</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg-black: #000000;
            --accent-purple: #a020f0;
            --dim-purple: rgba(160, 32, 240, 0.2);
            --glass: rgba(10, 10, 10, 0.8);
            --neon-glow: 0 0 20px rgba(160, 32, 240, 0.4);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
        }

        body {
            background-color: var(--bg-black);
            background-image: url("wallpaper.png"); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: rgba(5, 0, 15, 0.95);
            backdrop-filter: blur(25px);
            padding: 40px 15px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(160, 32, 240, 0.2);
            z-index: 100;
        }

        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-area img { 
            max-width: 140px; 
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 10px var(--accent-purple));
        }

        .nav-category {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-purple);
            margin: 20px 0 10px 10px;
            font-weight: 800;
        }

        .nav-item {
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: 0.3s;
            font-weight: 500;
            border: 1px solid transparent;
        }

        .nav-item:hover { background: rgba(255, 255, 255, 0.05); }

        .nav-item.active {
            background: var(--dim-purple);
            border: 1px solid var(--accent-purple);
            box-shadow: 0 0 15px rgba(160, 32, 240, 0.2);
        }

        /* MAIN AREA */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .view-section {
            width: 100%;
            max-width: 800px;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .view-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card {
            background: var(--glass);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h1 {
            font-size: 52px;
            font-weight: 900;
            margin-bottom: 40px;
            background: linear-gradient(to right, #fff, var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        /* DRAG & DROP ZONE */
        .upload-label {
            width: 100%;
            border: 2px dashed var(--accent-purple);
            border-radius: 24px;
            padding: 70px 20px;
            background: rgba(160, 32, 240, 0.03);
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            position: relative;
        }

        /* Visual state when dragging a file over the box */
        .upload-label.drag-over {
            background: rgba(160, 32, 240, 0.15);
            border-color: #ffffff;
            box-shadow: var(--neon-glow);
            transform: scale(1.02);
        }

        .btn {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 22px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            margin-top: 30px;
            cursor: pointer;
            display: none;
            box-shadow: 0 10px 25px rgba(160, 32, 240, 0.4);
        }

        .status-msg {
            margin-top: 25px;
            font-weight: bold;
            color: var(--accent-purple);
            text-transform: uppercase;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <img src="logo.png" alt="Bridges">
        </div>

        <div class="nav-category">Formatter</div>
        <div class="nav-item active" onclick="switchView('sales')">Sales</div>
        <div class="nav-item" onclick="switchView('purchase')">Purchase</div>
        
        <div style="margin-top: auto; text-align: center; font-size: 10px; color: var(--accent-purple); opacity: 0.5;">
            PRO EDITION V6.1
        </div>
    </div>

    <div class="main-content">
        <div id="view-sales" class="view-section active">
            <div class="card">
                <h1>Bridges</h1>
                <label class="upload-label" id="drop-zone-sales" for="sales-upload">
                    <p style="font-size: 22px; font-weight: 800;">⚡ DRAG OR UPLOAD SALES ⚡</p>
                    <p style="font-size: 14px; opacity: 0.6; margin-top: 10px;">Supports .xlsx and .csv</p>
                    <input id="sales-upload" type="file" accept=".xlsx, .csv" />
                </label>
                <div id="sales-status" class="status-msg"></div>
                <button id="sales-dl" class="btn">DOWNLOAD SALES EXCEL</button>
            </div>
        </div>

        <div id="view-purchase" class="view-section">
            <div class="card">
                <h1>Bridges</h1>
                <label class="upload-label" id="drop-zone-purchase" for="purchase-upload">
                    <p style="font-size: 22px; font-weight: 800; color: #00ffcc;">📦 DRAG OR UPLOAD PURCHASE 📦</p>
                    <p style="font-size: 14px; opacity: 0.6; margin-top: 10px;">Supports .xlsx and .csv</p>
                    <input id="purchase-upload" type="file" accept=".xlsx, .csv" />
                </label>
                <div id="purchase-status" class="status-msg"></div>
                <button id="purchase-dl" class="btn" style="background: #00ffcc; color: #000;">DOWNLOAD PURCHASE EXCEL</button>
            </div>
        </div>
    </div>

    <script>
        let salesData = [];
        let purchaseData = [];

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- DRAG AND DROP SETUP ---
        function setupDragAndDrop(elementId, type) {
            const dropZone = document.getElementById(elementId);

            // Prevent default browser behavior (opening the file)
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, e => {
                    e.preventDefault();
                    e.stopPropagation();
                }, false);
            });

            // Visual feedback when dragging over
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-over'), false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-over'), false);
            });

            // Handle the dropped file
            dropZone.addEventListener('drop', (e) => {
                const file = e.dataTransfer.files[0];
                if (file) handleFileProcessing(file, type);
            }, false);
        }

        // Initialize drag and drop for both sections
        setupDragAndDrop('drop-zone-sales', 'sales');
        setupDragAndDrop('drop-zone-purchase', 'purchase');

        // Standard click-to-upload listeners
        document.getElementById('sales-upload').addEventListener('change', (e) => handleFileProcessing(e.target.files[0], 'sales'));
        document.getElementById('purchase-upload').addEventListener('change', (e) => handleFileProcessing(e.target.files[0], 'purchase'));

        // Processing Router
        function handleFileProcessing(file, type) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, defval: ""});
                
                if (type === 'sales') processSales(json, file.name.toLowerCase());
                else processPurchase(json, file.name.toLowerCase());
            };
            reader.readAsArrayBuffer(file);
        }

        function processSales(data, name) {
            const date = new Date().toLocaleDateString('en-GB');
            const h1 = data[0], h2 = data[1];
            const headers = h1.map((v, i) => (String(h2[i]).trim() && String(h2[i]).toLowerCase() !== "nan") ? `${String(v).trim()} ${String(h2[i]).trim()}` : "");
            
            const pIdx = headers.findIndex(h => h.toLowerCase().includes("product") || h.toLowerCase().includes("system")) || 1;
            const gIdx = headers.findIndex(h => h.toLowerCase().includes("gst")) || 2;
            const bIdx = headers.findIndex(h => h.toLowerCase().includes("billing")) || 3;
            const stores = headers.map((h, i) => ({n: h, id: i})).filter(h => h.id > bIdx && h.n && !h.n.toLowerCase().includes("total"));

            let melted = [];
            for (let r = 2; r < data.length; r++) {
                if(!data[r][pIdx]) continue;
                stores.forEach((s, sIdx) => {
                    let q = parseFloat(String(data[r][s.id] || "").replace(/[^\d.]/g, ''));
                    if(q > 0) melted.push({p: data[r][pIdx], b: data[r][bIdx], g: data[r][gIdx], party: s.n, qty: q, v: sIdx + 1});
                });
            }
            melted.sort((a,b) => a.v - b.v);

            const isKA = ["bengaluru", "mysuru", "mangaluru", "hubballi", "belagavi"].some(c => name.includes(c));
            salesData = [["SL", "voucher no", "voucher date", "Party name", "Product", "Qty", "GST %", "Rate per Qty excl.GST", "Cgst", "SGST", "IGST", "Total"]];

            melted.forEach((item, i) => {
                let g = Math.round(parseFloat(String(item.g).replace(/[^\d.]/g, '')) < 1 ? parseFloat(String(item.g).replace(/[^\d.]/g, ''))*100 : parseFloat(String(item.g).replace(/[^\d.]/g, '')));
                let rate = parseFloat((parseFloat(String(item.b).replace(/[^\d.]/g, '')) / (1 + (g/100))).toFixed(2));
                let tax = rate * (g/100) * item.qty;
                let c = isKA ? parseFloat((tax/2).toFixed(2)) : 0, s = isKA ? parseFloat((tax/2).toFixed(2)) : 0, ig = isKA ? 0 : parseFloat(tax.toFixed(2));
                salesData.push([i+1, item.v, date, item.party, item.p, item.qty, g, rate, c, s, ig, parseFloat(((rate*item.qty)+c+s+ig).toFixed(2))]);
            });

            document.getElementById('sales-status').innerText = "Sales Processed Successfully!";
            document.getElementById('sales-dl').style.display = "block";
        }

        function processPurchase(data, name) {
            // Placeholder until you provide headers tomorrow
            purchaseData = data; 
            document.getElementById('purchase-status').innerText = "Purchase Logic Ready for Config...";
            document.getElementById('purchase-dl').style.display = "block";
        }

        document.getElementById('sales-dl').addEventListener('click', () => {
            const ws = XLSX.utils.aoa_to_sheet(salesData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Bridges_Sales");
            XLSX.writeFile(wb, "Bridges_Sales_Output.xlsx");
        });

        document.getElementById('purchase-dl').addEventListener('click', () => {
            const ws = XLSX.utils.aoa_to_sheet(purchaseData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Bridges_Purchase");
            XLSX.writeFile(wb, "Bridges_Purchase_Output.xlsx");
        });
    </script>
</body>
</html>
