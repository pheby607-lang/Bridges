<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridges | Data Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        /* 1. THE NEON THEME VARIABLES */
        :root {
            --bg-black: #000000;
            --panel-dark: rgba(10, 0, 20, 0.8);
            --neon-purple: #a020f0;
            --glow-purple: rgba(160, 32, 240, 0.4);
            --text-main: #ffffff;
            --text-dim: #a9a9a9;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-black);
            /* Subtle purple ambient glow in corners */
            background-image: 
                radial-gradient(circle at 15% 15%, #1a0033 0%, transparent 35%),
                radial-gradient(circle at 85% 85%, #0d001a 0%, transparent 35%);
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
        }

        /* 2. SIDEBAR NAVIGATION */
        .sidebar {
            width: 280px;
            background-color: #05000a;
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(160, 32, 240, 0.3);
            box-shadow: 5px 0 20px rgba(0, 0, 0, 0.5);
        }

        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-area img { 
            max-width: 140px; 
            filter: drop-shadow(0 0 10px var(--neon-purple)); 
        }

        .nav-item {
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            cursor: pointer;
            background: rgba(160, 32, 240, 0.05);
            border: 1px solid rgba(160, 32, 240, 0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .nav-item:hover {
            background: rgba(160, 32, 240, 0.2);
            border-color: var(--neon-purple);
            transform: translateX(8px);
            box-shadow: 0 0 15px var(--glow-purple);
        }

        .coming-soon {
            padding: 15px;
            color: #444;
            border: 1px dashed #333;
            border-radius: 12px;
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
        }

        hr { border: 0; height: 1px; background: var(--neon-purple); opacity: 0.2; margin: 25px 0; }

        /* 3. MAIN DASHBOARD AREA */
        .main-content {
            flex: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Wallpaper overlay if file exists */
            background-image: url("wallpaper.png");
            background-size: cover;
            background-position: center;
        }

        .glass-panel {
            background: var(--panel-dark);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(160, 32, 240, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 850px;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 35px;
            letter-spacing: 3px;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 4. THE UPLOADER - PERFECTLY CENTERED */
        .file-upload-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            border: 2px dashed var(--neon-purple);
            border-radius: 20px;
            padding: 70px;
            background: rgba(160, 32, 240, 0.02);
            transition: 0.4s;
            cursor: pointer;
            text-align: center;
        }

        .file-upload-wrapper:hover {
            background: rgba(160, 32, 240, 0.07);
            border-style: solid;
            box-shadow: inset 0 0 30px rgba(160, 32, 240, 0.1);
        }

        input[type="file"] { display: none; }

        .btn {
            background: var(--neon-purple);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 800;
            width: 100%;
            margin-top: 35px;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(160, 32, 240, 0.5);
            display: none;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(160, 32, 240, 0.7);
        }

        #status { 
            text-align: center; 
            margin-top: 25px; 
            font-weight: 600; 
            color: var(--neon-purple);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <img src="logo.png" alt="Bridges" onerror="this.style.display='none'">
        </div>
        
        <div class="nav-item">Data Formatter</div>
        <div class="nav-item" style="opacity: 0.4; cursor: not-allowed;">My Work</div>
        <div class="nav-item" style="opacity: 0.4; cursor: not-allowed;">Your Learning</div>
        
        <hr>
        
        <div class="coming-soon">Purchase Formats</div>
        <div class="coming-soon">Bank Statements</div>
        
        <div style="margin-top: auto; text-align: center; font-size: 10px; color: #333;">
            VERSION 3.0 | NO-LOGIN SECURE
        </div>
    </div>

    <div class="main-content">
        <div class="glass-panel">
            <h1>Bridges Engine</h1>
            
            <label class="file-upload-wrapper" for="file-upload">
                <div style="font-size: 22px; font-weight: 700; margin-bottom: 10px;">⚡ UPLOAD ORDER SHEET ⚡</div>
                <div style="color: var(--text-dim); font-size: 14px;">Drag & Drop or Click to Browse</div>
                <input id="file-upload" type="file" accept=".xlsx, .csv" />
            </label>

            <div id="status"></div>
            <button id="download-btn" class="btn">GENERATE FORMATTED EXCEL</button>
        </div>
    </div>

    <script>
        let finalWorkbookData = [];

        document.getElementById('file-upload').addEventListener('change', handleFile, false);
        document.getElementById('download-btn').addEventListener('click', downloadExcel, false);

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const fileName = file.name.toLowerCase();
            
            document.getElementById('status').innerText = "CALCULATING TAXES...";
            document.getElementById('status').style.color = "#a020f0";

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, defval: ""});
                    processData(rawData, fileName);
                } catch (err) {
                    document.getElementById('status').innerText = "ERROR PROCESSING FILE";
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function processData(data, fileName) {
            const today = new Date();
            const today_ist = String(today.getDate()).padStart(2, '0') + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + today.getFullYear();

            const header1 = data[0];
            const header2 = data[1];
            let combinedHeaders = [];
            for(let i=0; i < Math.max(header1.length, header2.length); i++) {
                let p = String(header1[i] || "").trim();
                let s = String(header2[i] || "").trim();
                combinedHeaders.push(s && s.toLowerCase() !== "nan" ? `${p} ${s}`.trim() : "");
            }

            let productIdx = combinedHeaders.findIndex(c => c.toLowerCase().includes("product") || c.toLowerCase().includes("system")) || 1;
            let gstIdx = combinedHeaders.findIndex(c => c.toLowerCase().includes("gst")) || 2;
            let billingIdx = combinedHeaders.findIndex(c => c.toLowerCase().includes("billing")) || 3;

            let storeCols = [];
            for(let i = billingIdx + 1; i < combinedHeaders.length; i++) {
                if(combinedHeaders[i] && !combinedHeaders[i].toLowerCase().includes("total")) {
                    storeCols.push({name: combinedHeaders[i], index: i});
                }
            }

            let melted = [];
            for (let r = 2; r < data.length; r++) {
                if(!data[r][productIdx]) continue;
                storeCols.forEach((store, sIdx) => {
                    let qty = parseFloat(String(data[r][store.index] || "").replace(/[^\d.]/g, ''));
                    if(qty > 0) {
                        melted.push({
                            p: data[r][productIdx],
                            b: data[r][billingIdx],
                            g: data[r][gstIdx],
                            party: store.name,
                            qty: qty,
                            vNo: sIdx + 1
                        });
                    }
                });
            }

            melted.sort((a, b) => a.vNo - b.vNo);

            const karnataka_cities = ["bengaluru", "mysuru", "mangaluru", "hubballi", "dharwad", "belagavi", "kalaburagi", "ballari", "vijayapura", "shivamogga", "tumakuru", "raichur", "bidar", "hospet", "gadag", "udupi", "chitradurga", "hassan", "mandya", "kolar", "chikkaballapur", "ramanagara", "chikkamagaluru", "madikeri", "karwar", "bagalkot", "yadgir", "koppal", "haveri", "davanagere", "chamarajanagar", "kodagu", "bhadravati", "robertsonpet", "kolar gold fields", "sirsi", "dandeli", "ranebennur", "gokak", "jamkhandi", "sindhanur", "gangavati", "ilkal", "sagar"];
            const isKarnataka = karnataka_cities.some(city => fileName.includes(city));

            finalWorkbookData = [["SL", "voucher no", "voucher date", "Party name", "Product", "Qty", "GST %", "Rate per Qty excl.GST", "Cgst", "SGST", "IGST", "Total"]];

            melted.forEach((item, i) => {
                let gRaw = parseFloat(String(item.g).replace(/[^\d.]/g, '')) || 0;
                let gPercent = (gRaw < 1 && gRaw > 0) ? Math.round(gRaw * 100) : Math.round(gRaw);
                let billPrice = parseFloat(String(item.b).replace(/[^\d.]/g, '')) || 0;
                
                let rateExcl = parseFloat((billPrice / (1 + (gPercent / 100))).toFixed(2));
                let tax = rateExcl * (gPercent / 100) * item.qty;
                
                let cgst = isKarnataka ? parseFloat((
