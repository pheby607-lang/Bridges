<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridges</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg-black: #000000;
            --accent-purple: #a020f0;
            --dim-purple: rgba(160, 32, 240, 0.2);
            --glass: rgba(10, 10, 10, 0.75);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
        }

        body {
            background-color: var(--bg-black);
            background-image: url("wallpaper.png"); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR HIERARCHY */
        .sidebar {
            width: 260px;
            background: rgba(5, 0, 15, 0.95);
            backdrop-filter: blur(25px);
            padding: 40px 15px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(160, 32, 240, 0.2);
        }

        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-area img { 
            max-width: 140px; 
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 10px var(--accent-purple));
        }

        .nav-category {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-purple);
            margin: 20px 0 10px 10px;
            font-weight: 800;
            opacity: 0.8;
        }

        .nav-item {
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: 0.3s;
            font-weight: 500;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background: var(--dim-purple);
            border: 1px solid var(--accent-purple);
            box-shadow: 0 0 15px rgba(160, 32, 240, 0.2);
        }

        .nav-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* MAIN CONTENT AREA */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .view-section {
            width: 100%;
            max-width: 800px;
            display: none; /* Hidden by default */
            animation: fadeIn 0.5s ease;
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--glass);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h1 {
            font-size: 52px;
            font-weight: 900;
            margin-bottom: 40px;
            background: linear-gradient(to right, #fff, var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .upload-label {
            width: 100%;
            border: 2px dashed var(--accent-purple);
            border-radius: 20px;
            padding: 70px 20px;
            background: rgba(160, 32, 240, 0.03);
            cursor: pointer;
            transition: 0.3s;
            display: block;
        }

        .upload-label:hover {
            background: rgba(160, 32, 240, 0.08);
            box-shadow: inset 0 0 30px rgba(160, 32, 240, 0.1);
        }

        .btn {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 22px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            margin-top: 30px;
            cursor: pointer;
            display: none;
            box-shadow: 0 10px 25px rgba(160, 32, 240, 0.4);
        }

        #status {
            margin-top: 25px;
            font-weight: bold;
            color: var(--accent-purple);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <img src="logo.png" alt="Bridges">
        </div>

        <div class="nav-category">Formatter</div>
        <div class="nav-item active" onclick="switchView('sales')">Sales</div>
        <div class="nav-item" onclick="switchView('purchase')">Purchase</div>
        
        <div style="margin-top: auto; text-align: center; font-size: 10px; color: var(--accent-purple); opacity: 0.5;">
            PRO EDITION V6.0
        </div>
    </div>

    <div class="main-content">
        <div id="view-sales" class="view-section active">
            <div class="card">
                <h1>Bridges</h1>
                <label class="upload-label" for="excel-upload">
                    <p style="font-size: 22px; font-weight: 800;">⚡ UPLOAD SALES SHEET ⚡</p>
                    <p style="font-size: 14px; opacity: 0.6; margin-top: 10px;">Excel or CSV Files</p>
                    <input id="excel-upload" type="file" accept=".xlsx, .csv" />
                </label>
                <div id="status"></div>
                <button id="dl-btn" class="btn">DOWNLOAD CONVERTED SALES</button>
            </div>
        </div>

        <div id="view-purchase" class="view-section">
            <div class="card">
                <h1>Bridges</h1>
                <p style="font-size: 20
